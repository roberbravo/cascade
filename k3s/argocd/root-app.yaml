apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cascade-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/roberbravo/cascade
    targetRevision: master
    path: k3s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

