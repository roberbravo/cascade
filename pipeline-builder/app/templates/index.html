<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade — Pipeline Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 16px 28px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-shrink: 0;
            background: #0a0a0a;
        }

        .topbar h1 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
        }

        .topbar span {
            font-size: 14px;
            color: #666;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
            overflow: hidden;
        }

        .left-top {
            flex: 1;
            padding: 28px;
            border-bottom: 1px solid #2a2a2a;
            overflow: hidden;
        }

        .left-bottom {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel-options {
            flex: 1;
            padding: 28px;
            border-right: 1px solid #2a2a2a;
        }

        .panel-actions {
            flex: 1;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px;
            min-width: 320px;
            height: 100%;
            max-height: calc(100vh - 52px);
        }

        .steps-scroll {
            flex: 1;
            overflow-y: scroll;
            margin-bottom: 12px;
            padding-right: 8px;
            height: 0;
        }

        .steps-scroll::-webkit-scrollbar { width: 4px; }
        .steps-scroll::-webkit-scrollbar-track { background: #111; }
        .steps-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            color: #ccc;
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 10px 14px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #555;
        }

        input[type="text"]:disabled {
            color: #444;
            background: #0f0f0f;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 13px;
            width: 100%;
        }

        input[type="file"]::file-selector-button {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 5px;
            color: #ccc;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 10px;
        }

        .form-group { margin-bottom: 16px; }

        .toggle-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .toggle-btn {
            flex: 1;
            padding: 9px;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #1e1e1e;
            border-color: #444;
            color: #ffffff;
        }

        .source-section { display: none; }
        .source-section.active { display: block; }

        .dataset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .step-item {
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            background: #111;
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .step-number {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .step-remove {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
            padding: 0;
        }

        .step-remove:hover { color: #aaa; }

        .btn-add-step {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed #2a2a2a;
            border-radius: 6px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-add-step:hover { border-color: #444; color: #aaa; }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #aaa;
            cursor: pointer;
        }

        .checkbox-row label {
            margin: 0;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #ffffff;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #ddd; }

        .btn-reset {
            width: 100%;
            padding: 11px;
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover { border-color: #444; color: #ccc; }

        .message {
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        .message.success {
            background: #0a1a0a;
            border: 1px solid #1e4a1e;
            color: #7dbb7d;
            display: block;
        }

        .message.error {
            background: #1a0a0a;
            border: 1px solid #4a1e1e;
            color: #bb7d7d;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 13px;
        }

        .spinner {
            border: 2px solid #222;
            border-top: 2px solid #888;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hint {
            font-size: 12px;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Cascade</h1>
        <span>Pipeline Builder — Argo Workflows</span>
    </div>

    <form id="pipelineForm" enctype="multipart/form-data">
        <div class="main">

            <div class="left">
                <div class="left-top">
                    <div class="section-title">General</div>
                    <div class="form-group">
                        <label>Nombre del workflow</label>
                        <input type="text" name="workflow_name" placeholder="mi-pipeline" required>
                    </div>

                    <div class="section-title">Dataset</div>
                    <div class="toggle-group">
                        <button type="button" class="toggle-btn active" data-source="url">URL remota</button>
                        <button type="button" class="toggle-btn" data-source="local">Archivo local</button>
                    </div>

                    <div id="source-url" class="source-section active">
                        <div class="dataset-grid">
                            <div class="form-group">
                                <label>URL del dataset</label>
                                <input type="url" id="dataset_url" name="dataset_url" placeholder="https://ejemplo.com/dataset.zip">
                                <div class="hint">CSV detectado automáticamente</div>
                            </div>
                            <div class="form-group">
                                <label>Archivo CSV</label>
                                <input type="text" id="dataset_file" name="dataset_file" placeholder="datos.csv">
                            </div>
                        </div>
                    </div>

                    <div id="source-local" class="source-section">
                        <div class="dataset-grid">
                            <div class="form-group">
                                <label>ZIP con datos</label>
                                <input type="file" id="dataset_zip" name="dataset_zip" accept=".zip">
                            </div>
                            <div class="form-group">
                                <label>CSV detectado</label>
                                <input type="text" id="dataset_file_local" name="dataset_file" placeholder="Esperando ZIP..." disabled>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="left-bottom">
                    <div class="panel-options">
                        <div class="section-title">Opciones</div>
                        <div class="checkbox-row">
                            <input type="checkbox" name="save_postgres" id="save_postgres" checked>
                            <label for="save_postgres">Guardar resultados en PostgreSQL</label>
                        </div>
                    </div>

                    <div class="panel-actions">
                        <div class="section-title">Acciones</div>
                        <button type="submit" class="btn-submit">Crear workflow</button>
                        <button type="reset" class="btn-reset">Limpiar</button>
                        <div class="loading" id="loading">
                            <div class="spinner"></div>
                            Creando workflow...
                        </div>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            </div>

            <div class="right">
                <div class="section-title">Pasos del pipeline</div>
                <div class="steps-scroll" id="steps-container"></div>
                <button type="button" class="btn-add-step" id="btn-add-step">+ Añadir paso</button>
            </div>

        </div>
    </form>

    <script>
        let stepCount = 0;
        let currentSource = 'url';

        function addStep(name = '') {
            stepCount++;
            const idx = stepCount;
            const container = document.getElementById('steps-container');
            const div = document.createElement('div');
            div.className = 'step-item';
            div.id = `step-${idx}`;
            div.innerHTML = `
                <div class="step-header">
                    <span class="step-number">Paso ${idx}</span>
                    <button type="button" class="step-remove" onclick="removeStep(${idx})">×</button>
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="step_name_${idx}" placeholder="ej: preparar" value="${name}" required>
                </div>
                <div class="form-group">
                    <label>Script Python</label>
                    <input type="file" name="step_script_${idx}" accept=".py" required>
                </div>
            `;
            container.appendChild(div);
            renumberSteps();
        }

        function removeStep(idx) {
            const el = document.getElementById(`step-${idx}`);
            if (el) el.remove();
            renumberSteps();
        }

        function renumberSteps() {
            document.querySelectorAll('.step-item').forEach((el, i) => {
                el.querySelector('.step-number').textContent = `Paso ${i + 1}`;
            });
        }

        addStep('preparar');
        addStep('procesar');
        addStep('postprocesar');

        document.getElementById('btn-add-step').addEventListener('click', () => addStep());

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                currentSource = btn.dataset.source;
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.source-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`source-${currentSource}`).classList.add('active');
            });
        });

        document.getElementById('dataset_url').addEventListener('blur', async () => {
            const url = document.getElementById('dataset_url').value;
            if (!url) return;
            const fileInput = document.getElementById('dataset_file');
            fileInput.value = 'Detectando...';
            try {
                const response = await fetch('/api/detect-csv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await response.json();
                fileInput.value = response.ok ? result.csv_file : '';
            } catch { fileInput.value = ''; }
        });

        document.getElementById('dataset_zip').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileInput = document.getElementById('dataset_file_local');
            fileInput.value = 'Detectando...';
            const formData = new FormData();
            formData.append('zip_file', file);
            try {
                const response = await fetch('/api/detect-csv-local', { method: 'POST', body: formData });
                const result = await response.json();
                fileInput.value = response.ok ? result.csv_file : 'Error: ' + result.error;
            } catch { fileInput.value = 'Error detectando CSV'; }
        });

        document.getElementById('pipelineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            loading.style.display = 'block';
            message.style.display = 'none';

            const formData = new FormData(e.target);
            formData.append('source_type', currentSource);
            formData.append('step_count', document.querySelectorAll('.step-item').length);

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const result = await response.json();
                loading.style.display = 'none';
                if (response.ok) {
                    message.className = 'message success';
                    message.innerHTML = `✓ ${result.message}<br>Argo: <strong>http://192.168.0.100:30800</strong>`;
                } else {
                    message.className = 'message error';
                    message.innerHTML = `✗ ${result.message}`;
                }
                message.style.display = 'block';
            } catch (error) {
                loading.style.display = 'none';
                message.className = 'message error';
                message.innerHTML = `✗ Error: ${error.message}`;
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
