<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade — Pipeline Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #555;
            font-size: 13px;
            margin-top: 6px;
        }

        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 10px 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #444;
        }

        input[type="text"]:disabled {
            color: #444;
            cursor: not-allowed;
        }

        input[type="file"] {
            width: 100%;
            padding: 8px 0;
            color: #888;
            font-size: 13px;
        }

        input[type="file"]::file-selector-button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #aaa;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            margin-right: 10px;
        }

        .toggle-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .toggle-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #222;
            border-radius: 6px;
            background: transparent;
            color: #555;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #1a1a1a;
            border-color: #333;
            color: #e0e0e0;
        }

        .source-section { display: none; }
        .source-section.active { display: block; }

        .step-item {
            background: #0a0a0a;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 10px;
            position: relative;
        }

        .step-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .step-number {
            font-size: 11px;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .step-remove {
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .step-remove:hover { color: #666; }

        .step-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .step-fields .full-width {
            grid-column: 1 / -1;
        }

        .btn-add-step {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed #222;
            border-radius: 6px;
            color: #444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .btn-add-step:hover {
            border-color: #333;
            color: #666;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #555;
            cursor: pointer;
        }

        .checkbox-row label {
            margin: 0;
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: none;
            border-radius: 6px;
            color: #000000;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover { background: #e0e0e0; }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            color: #444;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-reset:hover { border-color: #333; color: #666; }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .message.success {
            background: #0d1f0d;
            border: 1px solid #1a3a1a;
            color: #4caf50;
            display: block;
        }

        .message.error {
            background: #1f0d0d;
            border: 1px solid #3a1a1a;
            color: #f44336;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 16px;
            color: #444;
            font-size: 13px;
        }

        .spinner {
            border: 2px solid #1e1e1e;
            border-top: 2px solid #555;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auto-detect-info {
            font-size: 11px;
            color: #333;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cascade</h1>
            <p>Pipeline Builder — Argo Workflows</p>
        </div>

        <form id="pipelineForm" enctype="multipart/form-data">

            <!-- General -->
            <div class="card">
                <div class="card-title">General</div>
                <div class="form-group">
                    <label>Nombre del workflow</label>
                    <input type="text" name="workflow_name" placeholder="mi-pipeline" required>
                </div>
            </div>

            <!-- Dataset -->
            <div class="card">
                <div class="card-title">Dataset</div>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" data-source="url">URL remota</button>
                    <button type="button" class="toggle-btn" data-source="local">Archivo local</button>
                </div>

                <div id="source-url" class="source-section active">
                    <div class="form-group">
                        <label>URL del dataset</label>
                        <input type="url" id="dataset_url" name="dataset_url" placeholder="https://ejemplo.com/dataset.zip">
                        <div class="auto-detect-info">CSV detectado automáticamente</div>
                    </div>
                    <div class="form-group">
                        <label>Archivo CSV</label>
                        <input type="text" id="dataset_file" name="dataset_file" placeholder="datos.csv">
                    </div>
                </div>

                <div id="source-local" class="source-section">
                    <div class="form-group">
                        <label>ZIP con datos</label>
                        <input type="file" id="dataset_zip" name="dataset_zip" accept=".zip">
                    </div>
                    <div class="form-group">
                        <label>Archivo CSV detectado</label>
                        <input type="text" id="dataset_file_local" name="dataset_file" placeholder="Esperando ZIP..." disabled>
                    </div>
                </div>
            </div>

            <!-- Steps -->
            <div class="card">
                <div class="card-title">Pasos del pipeline</div>
                <div id="steps-container"></div>
                <button type="button" class="btn-add-step" id="btn-add-step">+ Añadir paso</button>
            </div>

            <!-- Options -->
            <div class="card">
                <div class="card-title">Opciones</div>
                <div class="checkbox-row">
                    <input type="checkbox" name="save_postgres" id="save_postgres" checked>
                    <label for="save_postgres">Guardar resultados en PostgreSQL</label>
                </div>
            </div>

            <!-- Actions -->
            <button type="submit" class="btn-submit">Crear workflow</button>
            <button type="reset" class="btn-reset">Limpiar</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                Creando workflow...
            </div>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        let currentSource = 'url';
        let stepCount = 0;

        function addStep(name = '', file = null) {
            stepCount++;
            const idx = stepCount;
            const container = document.getElementById('steps-container');

            const div = document.createElement('div');
            div.className = 'step-item';
            div.id = `step-${idx}`;
            div.innerHTML = `
                <div class="step-header">
                    <span class="step-number">Paso ${idx}</span>
                    <button type="button" class="step-remove" onclick="removeStep(${idx})">×</button>
                </div>
                <div class="step-fields">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" name="step_name_${idx}" placeholder="ej: preparar" value="${name}" required>
                    </div>
                    <div class="form-group">
                        <label>Script Python</label>
                        <input type="file" name="step_script_${idx}" accept=".py" required>
                    </div>
                </div>
            `;
            container.appendChild(div);
            renumberSteps();
        }

        function removeStep(idx) {
            const el = document.getElementById(`step-${idx}`);
            if (el) el.remove();
            renumberSteps();
        }

        function renumberSteps() {
            document.querySelectorAll('.step-item').forEach((el, i) => {
                el.querySelector('.step-number').textContent = `Paso ${i + 1}`;
            });
        }

        // Añadir 3 pasos por defecto
        addStep('preparar');
        addStep('procesar');
        addStep('postprocesar');

        document.getElementById('btn-add-step').addEventListener('click', () => addStep());

        // Toggle fuente
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                currentSource = btn.dataset.source;
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.source-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`source-${currentSource}`).classList.add('active');
            });
        });

        // Auto-detectar CSV desde URL
        document.getElementById('dataset_url').addEventListener('blur', async () => {
            const url = document.getElementById('dataset_url').value;
            if (!url) return;
            const fileInput = document.getElementById('dataset_file');
            fileInput.value = 'Detectando...';
            try {
                const response = await fetch('/api/detect-csv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await response.json();
                fileInput.value = response.ok ? result.csv_file : '';
            } catch { fileInput.value = ''; }
        });

        // Auto-detectar CSV desde ZIP
        document.getElementById('dataset_zip').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileInput = document.getElementById('dataset_file_local');
            fileInput.value = 'Detectando...';
            const formData = new FormData();
            formData.append('zip_file', file);
            try {
                const response = await fetch('/api/detect-csv-local', { method: 'POST', body: formData });
                const result = await response.json();
                fileInput.value = response.ok ? result.csv_file : 'Error: ' + result.error;
            } catch { fileInput.value = 'Error detectando CSV'; }
        });

        // Submit
        document.getElementById('pipelineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            loading.style.display = 'block';
            message.style.display = 'none';

            const formData = new FormData(e.target);
            formData.append('source_type', currentSource);

            // Recoger pasos dinámicos
            const steps = document.querySelectorAll('.step-item');
            formData.append('step_count', steps.length);

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const result = await response.json();
                loading.style.display = 'none';
                if (response.ok) {
                    message.className = 'message success';
                    message.innerHTML = `✓ ${result.message}<br>Argo Workflows: <strong>http://192.168.0.100:8080</strong>`;
                } else {
                    message.className = 'message error';
                    message.innerHTML = `✗ ${result.message}`;
                }
                message.style.display = 'block';
            } catch (error) {
                loading.style.display = 'none';
                message.className = 'message error';
                message.innerHTML = `✗ Error de conexión: ${error.message}`;
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
