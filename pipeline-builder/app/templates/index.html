<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade - Pipeline Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: transparent;
            color: #666;
        }
        
        .toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="url"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"]:disabled {
            background: #f5f5f5;
            color: #666;
            cursor: not-allowed;
        }
        
        input[type="file"] {
            padding: 8px;
        }
        
        .file-group {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .file-item {
            margin-bottom: 15px;
        }
        
        .file-item:last-child {
            margin-bottom: 0;
        }
        
        .checkbox-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: 500;
            cursor: pointer;
        }
        
        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-reset:hover {
            background: #e0e0e0;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .file-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .auto-detect-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            font-style: italic;
        }

        .source-section {
            display: none;
        }

        .source-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Cascade Pipeline Builder</h1>
        <p class="subtitle">Crea cadenas de procesado con tus propios scripts</p>
        
        <form id="pipelineForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="workflow_name">Nombre del Workflow</label>
                <input type="text" id="workflow_name" name="workflow_name" 
                       placeholder="ej: mi-pipeline-datos" required>
            </div>
            
            <!-- Toggle de fuente de datos -->
            <div class="form-group">
                <label>Fuente del Dataset</label>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" data-source="url">
                        🌐 URL Remota
                    </button>
                    <button type="button" class="toggle-btn" data-source="local">
                        📁 Archivo Local
                    </button>
                </div>
            </div>
            
            <!-- Sección URL Remota -->
            <div id="source-url" class="source-section active">
                <div class="form-group">
                    <label for="dataset_url">URL del Dataset</label>
                    <input type="url" id="dataset_url" name="dataset_url" 
                           placeholder="https://ejemplo.com/dataset.zip">
                    <div class="auto-detect-info">Se detectará automáticamente el CSV (si es posible)</div>
                </div>
                
                <div class="form-group">
                    <label for="dataset_file">Nombre del archivo CSV</label>
                    <input type="text" id="dataset_file" name="dataset_file" 
                           placeholder="ej: datos.csv">
                </div>
            </div>
            
            <!-- Sección Archivo Local -->
            <div id="source-local" class="source-section">
                <div class="form-group">
                    <label for="dataset_zip">Subir ZIP con datos</label>
                    <input type="file" id="dataset_zip" name="dataset_zip" accept=".zip">
                    <div class="auto-detect-info">Se detectará automáticamente el CSV dentro del ZIP</div>
                </div>
                
                <div class="form-group">
                    <label for="dataset_file_local">Nombre del archivo CSV detectado</label>
                    <input type="text" id="dataset_file_local" name="dataset_file" 
                           placeholder="Esperando ZIP..." disabled readonly>
                </div>
            </div>
            
            <!-- Scripts -->
            <div class="form-group">
                <label>Scripts del Pipeline</label>
                <div class="file-group">
                    <div class="file-item">
                        <div class="file-label">📥 Script de Preparación</div>
                        <input type="file" name="prep_script" accept=".py" required>
                    </div>
                    
                    <div class="file-item">
                        <div class="file-label">⚙️  Script de Procesamiento</div>
                        <input type="file" name="process_script" accept=".py" required>
                    </div>
                    
                    <div class="file-item">
                        <div class="file-label">📊 Script de Postprocesamiento</div>
                        <input type="file" name="postproc_script" accept=".py" required>
                    </div>
                </div>
            </div>
            
            <!-- Opciones -->
            <div class="form-group">
                <label>Opciones</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="save_postgres" checked>
                        Guardar resultados en PostgreSQL
                    </label>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="button-group">
                <button type="submit" class="btn-submit">🚀 Crear Workflow</button>
                <button type="reset" class="btn-reset">Limpiar</button>
            </div>
            
            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Creando workflow...</p>
            </div>
            
            <!-- Mensajes -->
            <div id="message" class="message"></div>
        </form>
    </div>
    
    <script>
        // Estado actual
        let currentSource = 'url';

        // Toggle entre fuentes
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                
                const source = btn.dataset.source;
                currentSource = source;
                
                // Actualizar botones
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Mostrar/ocultar secciones
                document.querySelectorAll('.source-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`source-${source}`).classList.add('active');
                
                // Ajustar required según fuente
                if (source === 'url') {
                    document.getElementById('dataset_url').required = true;
                    document.getElementById('dataset_file').required = true;
                    document.getElementById('dataset_zip').required = false;
                } else {
                    document.getElementById('dataset_url').required = false;
                    document.getElementById('dataset_file').required = false;
                    document.getElementById('dataset_zip').required = true;
                }
            });
        });

        // Auto-detectar CSV desde URL
        document.getElementById('dataset_url').addEventListener('blur', async () => {
            const url = document.getElementById('dataset_url').value;
            const fileInput = document.getElementById('dataset_file');
            
            if (!url) return;
            
            fileInput.value = 'Detectando...';
            
            try {
                const response = await fetch('/api/detect-csv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    fileInput.value = result.csv_file;
                } else {
                    fileInput.value = '';
                    console.log('No se pudo auto-detectar');
                }
            } catch (error) {
                fileInput.value = '';
                console.error(error);
            }
        });

        // Auto-detectar CSV desde ZIP local
        document.getElementById('dataset_zip').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const fileInput = document.getElementById('dataset_file_local');
            
            if (!file) return;
            
            fileInput.value = 'Detectando...';
            
            try {
                const formData = new FormData();
                formData.append('zip_file', file);
                
                const response = await fetch('/api/detect-csv-local', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    fileInput.value = result.csv_file;
                } else {
                    fileInput.value = 'Error: ' + result.error;
                }
            } catch (error) {
                fileInput.value = 'Error detectando CSV';
                console.error(error);
            }
        });

        // Enviar formulario
        document.getElementById('pipelineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            
            loading.style.display = 'block';
            message.style.display = 'none';
            
            const formData = new FormData(e.target);
            
            // Añadir tipo de fuente
            formData.append('source_type', currentSource);
            
            // Validar que dataset_file no esté vacío
            if (!formData.get('dataset_file')) {
                loading.style.display = 'none';
                message.className = 'message error';
                message.innerHTML = '✗ Por favor detecta o especifica el nombre del archivo CSV';
                message.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                loading.style.display = 'none';
                
                if (response.ok) {
                    message.className = 'message success';
                    message.innerHTML = `✓ ${result.message}<br>Accede a Argo en: <strong>http://argo.homelab.local:8080</strong>`;
                    message.style.display = 'block';
                    e.target.reset();
                    document.getElementById('dataset_file').value = '';
                    document.getElementById('dataset_file_local').value = '';
                } else {
                    message.className = 'message error';
                    message.innerHTML = `✗ Error: ${result.message}`;
                    message.style.display = 'block';
                }
            } catch (error) {
                loading.style.display = 'none';
                message.className = 'message error';
                message.innerHTML = `✗ Error de conexión: ${error.message}`;
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
